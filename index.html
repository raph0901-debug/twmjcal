<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廣東麻將拉莊計分系統 (自摸拉莊版)</title>
    <style>
        :root {
            --bg-color: #f7fafc;
            --panel-bg: #ffffff;
            --primary: #2d3748;
            --accent: #e53e3e;
            --success: #38a169;
            --border: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary);
            padding: 20px;
            margin: 0;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 850px;
            background: var(--panel-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h2 {
            text-align: center;
            margin-top: 0;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border);
        }

        /* 分頁標籤樣式 */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }
        .tab-btn {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            background: #edf2f7;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* 四家狀態面板 */
        .player-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        .player-card {
            background: #edf2f7;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 2px solid transparent;
        }
        .player-card.is-dealer { border-color: #ecc94b; background: #fefcbf; }
        .player-card.is-targeted { border-color: var(--accent); background: #fff5f5; }
        .player-name { font-size: 1.2rem; font-weight: bold; }
        .player-status-text { font-size: 0.85rem; color: #718096; margin-top: 5px; }
        .debt-pool-val { font-size: 1.1rem; font-weight: bold; color: var(--accent); margin-top: 5px; }

        /* 總分排行榜 */
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 1.1rem;
        }
        .leaderboard-table th, .leaderboard-table td {
            border: 1px solid var(--border);
            padding: 12px;
            text-align: center;
        }
        .leaderboard-table th { background: #edf2f7; }
        .score-pos { color: var(--success); font-weight: bold; }
        .score-neg { color: var(--accent); font-weight: bold; }

        /* 輸入與控制面板 */
        .control-section {
            background: #f7fafc;
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .form-group label { font-weight: bold; width: 120px; }
        select, input[type="number"], input[type="text"] {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            flex-grow: 1;
        }
        .btn {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
            margin-top: 5px;
        }
        .btn-success { background: var(--success); }
        .btn-success:hover { background: #2f855a; }
        .btn-danger { background: var(--accent); }
        .btn-danger:hover { background: #c53030; }

        /* 割禾青專區 */
        .surrender-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        .surrender-box {
            background: #fff5f5;
            border: 2px solid var(--accent);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        .name-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        .name-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-weight: bold;
        }
        .name-field input {
            width: 100%;
            box-sizing: border-box;
        }

        /* 歷史紀錄 */
        .history-section { border: 1px solid var(--border); border-radius: 8px; padding: 15px; }
        .history-list { list-style: none; padding: 0; margin: 0; }
        .history-item { padding: 10px 0; border-bottom: 1px dashed var(--border); display: flex; justify-content: space-between; }
        .formula { font-size: 0.85rem; color: #718096; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>廣東麻將拉莊計分與清算系統</h2>

    <!-- 分頁導覽標籤 -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('game-tab', this)">當局拉莊計分面板</button>
        <button class="tab-btn" onclick="switchTab('score-tab', this)">四家總分數排行榜</button>
    </div>

    <!-- ================= 分頁一：當局拉莊計分 ================= -->
    <div id="game-tab" class="tab-content active">
        <!-- 玩家名稱設定 -->
        <div class="control-section">
            <h3 style="margin-top:0;">玩家名稱設定</h3>
            <div class="name-grid">
                <label class="name-field">東家
                    <input type="text" id="name-東" placeholder="東家" oninput="renamePlayer('東', this.value)">
                </label>
                <label class="name-field">南家
                    <input type="text" id="name-南" placeholder="南家" oninput="renamePlayer('南', this.value)">
                </label>
                <label class="name-field">西家
                    <input type="text" id="name-西" placeholder="西家" oninput="renamePlayer('西', this.value)">
                </label>
                <label class="name-field">北家
                    <input type="text" id="name-北" placeholder="北家" oninput="renamePlayer('北', this.value)">
                </label>
            </div>
        </div>

        <!-- 實時四家拉莊狀態 -->
        <div class="player-grid">
            <div class="player-card is-dealer" id="card-東">
                <div class="player-name" id="display-name-東">東家 (莊)</div>
                <div id="status-東" class="player-status-text">連莊中</div>
                <div id="pool-東" class="debt-pool-val" style="color:#ecc94b;">0 番</div>
            </div>
            <div class="player-card" id="card-南">
                <div class="player-name" id="display-name-南">南家</div>
                <div id="status-南" class="player-status-text">閒家</div>
                <div id="pool-南" class="debt-pool-val">0 番</div>
            </div>
            <div class="player-card" id="card-西">
                <div class="player-name" id="display-name-西">西家</div>
                <div id="status-西" class="player-status-text">閒家</div>
                <div id="pool-西" class="debt-pool-val">0 番</div>
            </div>
            <div class="player-card" id="card-北">
                <div class="player-name" id="display-name-北">北家</div>
                <div id="status-北" class="player-status-text">閒家</div>
                <div id="pool-北" class="debt-pool-val">0 番</div>
            </div>
        </div>

        <!-- 動態割禾青專區 -->
        <div id="surrenderArea" class="surrender-container" style="display: none;">
            <!-- 東家割禾青 -->
            <div id="surrenderBox-東" class="surrender-box" style="display:none;">
                <strong id="surrender-title-東" style="color:var(--accent);">東家可選擇清算</strong>
                <div style="margin: 5px 0;">累積債務：<span id="label-debt-東" style="font-weight:bold;">0</span> 番</div>
                <button class="btn btn-danger" style="padding:6px; font-size:0.9rem;" onclick="executeSurrender('東')">割禾青 (全數認輸離場)</button>
            </div>
            <!-- 南家割禾青 -->
            <div id="surrenderBox-南" class="surrender-box" style="display:none;">
                <strong id="surrender-title-南" style="color:var(--accent);">南家可選擇清算</strong>
                <div style="margin: 5px 0;">累積債務：<span id="label-debt-南" style="font-weight:bold;">0</span> 番</div>
                <button class="btn btn-danger" style="padding:6px; font-size:0.9rem;" onclick="executeSurrender('南')">割禾青 (全數認輸離場)</button>
            </div>
            <!-- 西家割禾青 -->
            <div id="surrenderBox-西" class="surrender-box" style="display:none;">
                <strong id="surrender-title-西" style="color:var(--accent);">西家可選擇清算</strong>
                <div style="margin: 5px 0;">累積債務：<span id="label-debt-西" style="font-weight:bold;">0</span> 番</div>
                <button class="btn btn-danger" style="padding:6px; font-size:0.9rem;" onclick="executeSurrender('西')">割禾青 (全數認輸離場)</button>
            </div>
            <!-- 北家割禾青 -->
            <div id="surrenderBox-北" class="surrender-box" style="display:none;">
                <strong id="surrender-title-北" style="color:var(--accent);">北家可選擇清算</strong>
                <div style="margin: 5px 0;">累積債務：<span id="label-debt-北" style="font-weight:bold;">0</span> 番</div>
                <button class="btn btn-danger" style="padding:6px; font-size:0.9rem;" onclick="executeSurrender('北')">割禾青 (全數認輸離場)</button>
            </div>
        </div>

        <!-- 輸入面板 -->
        <div class="control-section">
            <h3 style="margin-top:0;">輸入本局和牌結果</h3>
            <div class="form-group">
                <label>贏家：</label>
                <select id="winnerSelect" onchange="toggleLoserField()">
                    <option id="winner-option-東" value="東">東家 (莊)</option>
                    <option id="winner-option-南" value="南">南家</option>
                    <option id="winner-option-西" value="西">西家</option>
                    <option id="winner-option-北" value="北">北家</option>
                </select>
            </div>
            <div class="form-group">
                <label>和牌類型：</label>
                <select id="typeSelect" onchange="toggleLoserField()">
                    <option value="自摸">自摸</option>
                    <option value="食和">食和 (放銃)</option>
                </select>
            </div>
            <div class="form-group" id="loserGroup" style="display:none;">
                <label>輸家 (放銃)：</label>
                <select id="loserSelect">
                    <option id="loser-option-南" value="南">南家</option>
                    <option id="loser-option-西" value="西">西家</option>
                    <option id="loser-option-北" value="北">北家</option>
                    <option id="loser-option-東" value="東">東家</option>
                </select>
            </div>
            <div class="form-group">
                <label>牌型番數：</label>
                <input type="number" id="baseScoreInput" value="50" min="1">
            </div>
            <button class="btn btn-success" onclick="submitHand()">計算並寫入當局明細</button>
        </div>

        <!-- 流水明細 -->
        <div class="history-section">
            <h3 style="margin-top:0; color:#718096;">拉莊流水分數池明細</h3>
            <ul id="historyList" class="history-list">
                <li style="color:#a0aec0; text-align:center;">暫無對局紀錄</li>
            </ul>
        </div>
    </div>

    <!-- ================= 分頁二：四家總分數排行榜 ================= -->
    <div id="score-tab" class="tab-content">
        <h3>全盤玩家總分數累計榜</h3>
        <table class="leaderboard-table">
            <thead>
                <tr>
                    <th>玩家</th>
                    <th>總積分 (番數)</th>
                    <th>狀態</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><strong id="leader-name-東">東家 (固定莊)</strong></td>
                    <td id="total-東">0</td>
                    <td id="global-status-東"><span style="color:#ecc94b; font-weight:bold;">莊家</span></td>
                </tr>
                <tr>
                    <td><strong id="leader-name-南">南家</strong></td>
                    <td id="total-南">0</td>
                    <td id="global-status-南">正常</td>
                </tr>
                <tr>
                    <td><strong id="leader-name-西">西家</strong></td>
                    <td id="total-西">0</td>
                    <td id="global-status-西">正常</td>
                </tr>
                <tr>
                    <td><strong id="leader-name-北">北家</strong></td>
                    <td id="total-北">0</td>
                    <td id="global-status-北">正常</td>
                </tr>
            </tbody>
        </table>
        <div style="text-align:center; margin-top:30px;">
            <button class="btn" style="background:#a0aec0; width:auto; padding:10px 20px;" onclick="resetAllScores()">重設所有人總分數</button>
        </div>
    </div>
</div>

<script>
    const PLAYERS = ['東', '南', '西', '北'];
    const DEFAULT_NAMES = { '東': '東家', '南': '南家', '西': '西家', '北': '北家' };

    // 橫跨多局的總分數儲存庫
    let globalScores = { '東': 0, '南': 0, '西': 0, '北': 0 };
    let playerNames = { ...DEFAULT_NAMES };

    // 當前拉莊局獨立債務池：第一層為拉莊者，第二層為被拉莊者。
    let laZhuangPools = createEmptyDebtPools();
    let debtHistory = [];

    function roundUp(val) { return Math.ceil(val); }   // 拉大
    function roundDown(val) { return Math.floor(val); } // 劈小

    function createEmptyDebtPools() {
        const pools = {};
        for (let creditor of PLAYERS) {
            pools[creditor] = {};
            for (let debtor of PLAYERS) {
                if (debtor !== creditor) pools[creditor][debtor] = 0;
            }
        }
        return pools;
    }

    function escapeHTML(value) {
        return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function getPlayerName(player) {
        const customName = (playerNames[player] || '').trim();
        return customName || DEFAULT_NAMES[player];
    }

    function formatPlayer(player, mode = 'normal') {
        const name = getPlayerName(player);
        const seatName = DEFAULT_NAMES[player];
        const isCustom = name !== seatName;

        if (player === '東' && mode === 'fixedDealer') {
            return isCustom ? `${name} (${seatName}/固定莊)` : `${seatName} (固定莊)`;
        }
        if (player === '東' && mode === 'dealer') {
            return isCustom ? `${name} (${seatName}/莊)` : `${seatName} (莊)`;
        }
        return isCustom ? `${name} (${seatName})` : seatName;
    }

    function formatPlayerForLog(player) {
        const name = getPlayerName(player);
        const seatName = DEFAULT_NAMES[player];
        return name === seatName ? seatName : `${name}(${seatName})`;
    }

    function renamePlayer(player, value) {
        playerNames[player] = value.trim() || DEFAULT_NAMES[player];
        updatePlayerLabels();
        updateUI();
    }

    function updatePlayerLabels() {
        for (let p of PLAYERS) {
            document.getElementById(`display-name-${p}`).innerText = formatPlayer(p, p === '東' ? 'dealer' : 'normal');
            document.getElementById(`leader-name-${p}`).innerText = formatPlayer(p, p === '東' ? 'fixedDealer' : 'normal');
            document.getElementById(`winner-option-${p}`).innerText = formatPlayer(p, p === '東' ? 'dealer' : 'normal');
            document.getElementById(`loser-option-${p}`).innerText = formatPlayer(p, p === '東' ? 'dealer' : 'normal');
            document.getElementById(`surrender-title-${p}`).innerText = `${formatPlayerForLog(p)}可選擇清算`;
        }
    }

    function getIncomingDebts(player) {
        return PLAYERS
            .filter(creditor => creditor !== player && laZhuangPools[creditor][player] > 0)
            .map(creditor => ({
                creditor,
                debtor: player,
                amount: laZhuangPools[creditor][player]
            }));
    }

    function getOutgoingDebts(player) {
        return PLAYERS
            .filter(debtor => debtor !== player && laZhuangPools[player][debtor] > 0)
            .map(debtor => ({
                creditor: player,
                debtor,
                amount: laZhuangPools[player][debtor]
            }));
    }

    function totalDebt(debts) {
        return debts.reduce((sum, debt) => sum + debt.amount, 0);
    }

    function clearInactiveCreditors(winner) {
        for (let creditor of PLAYERS) {
            if (creditor === winner) continue;
            for (let debtor of PLAYERS) {
                if (debtor !== creditor) laZhuangPools[creditor][debtor] = 0;
            }
        }
    }

    function addLaZhuangDebt(creditor, debtor, amount) {
        if (creditor === debtor) return;
        laZhuangPools[creditor][debtor] += amount;
    }

    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    function toggleLoserField() {
        const type = document.getElementById('typeSelect').value;
        document.getElementById('loserGroup').style.display = (type === '食和') ? 'flex' : 'none';
    }

    function submitHand() {
        const winner = document.getElementById('winnerSelect').value;
        const type = document.getElementById('typeSelect').value;
        const loser = document.getElementById('loserSelect').value;
        const baseScore = parseInt(document.getElementById('baseScoreInput').value) || 0;

        if (baseScore <= 0) return alert('請輸入有效番數');
        if (type === '食和' && winner === loser) return alert('贏家輸家不能相同');

        // 先計算當局的基本輸贏（計入總分榜）
        let roundPnl = { '東': 0, '南': 0, '西': 0, '北': 0 };
        if (type === '自摸') {
            roundPnl[winner] += (baseScore * 3);
            for (let p in roundPnl) {
                if (p !== winner) roundPnl[p] -= baseScore;
            }
        } else {
            roundPnl[winner] += baseScore;
            roundPnl[loser] -= baseScore;
        }

        // 【功能：劈（反殺）邏輯判斷】
        const pipiDebts = getIncomingDebts(winner);
        const isPipiTriggered = pipiDebts.length > 0;

        for (let debt of pipiDebts) {
            const pipiBonus = roundDown(debt.amount / 2); // 反殺成功，拉莊累積債務直接砍半
            roundPnl[winner] += pipiBonus;
            roundPnl[debt.creditor] -= pipiBonus;

            debtHistory.push({
                text: `${formatPlayerForLog(winner)}成功「劈（反殺復仇）」！`,
                detail: `原本被${formatPlayerForLog(debt.creditor)}拉莊累積 ${debt.amount} 番，直接砍半結算！`,
                score: `反殺獎勵 (+${pipiBonus})`
            });

            // 解除贏家對該拉莊者的被拉狀態
            laZhuangPools[debt.creditor][winner] = 0;
        }

        // 將這局的基本輸贏計入總分榜
        for (let p in globalScores) {
            globalScores[p] += roundPnl[p];
        }

        // 未能繼續和牌的拉莊者，其既有拉莊關係解除。
        clearInactiveCreditors(winner);

        if (type === '食和') {
            addLaZhuangDebt(winner, loser, baseScore);

            debtHistory.push({
                text: `${formatPlayerForLog(winner)}食${formatPlayerForLog(loser)} (放銃拉莊)`,
                detail: `${formatPlayerForLog(loser)}放銃，番數併入${formatPlayerForLog(winner)}的拉莊池`,
                score: `池新增 +${baseScore}`
            });
        } else if (type === '自摸') {
            // 任何一家自摸都會對其餘三家建立或疊加拉莊。
            debtHistory.push({
                text: `${formatPlayerForLog(winner)}自摸 (全員拉莊/滾雪球)`,
                detail: `${formatPlayerForLog(winner)}自摸，三家全包入池或疊加拉大`,
                score: `+${baseScore * 3}`
            });

            for (let p of PLAYERS.filter(player => player !== winner)) {
                if (laZhuangPools[winner][p] > 0) {
                    // 本來就被拉：公式不變（當局自摸 + 歷史池折半拉大）
                    let prevDebt = laZhuangPools[winner][p];
                    let transferScore = roundUp(prevDebt / 2);
                    let addedDebt = baseScore + transferScore;
                    laZhuangPools[winner][p] += addedDebt;

                    debtHistory.push({
                        text: `└─ ${formatPlayerForLog(p)}債務疊加`,
                        detail: `自摸(${baseScore}) + 歷史池折半拉大(⌈${prevDebt}/2⌉ = ${transferScore})`,
                        score: `池新增 +${addedDebt}`
                    });
                } else {
                    // 本來沒被拉：自摸直接「啟動」對該家的拉莊！
                    laZhuangPools[winner][p] = baseScore;

                    debtHistory.push({
                        text: `└─ ${formatPlayerForLog(p)}新被拉莊`,
                        detail: `${formatPlayerForLog(winner)}自摸直接建立拉莊關係`,
                        score: `池新增 +${baseScore}`
                    });
                }
            }
        }

        updateUI();
        if (isPipiTriggered) {
            alert(`${formatPlayerForLog(winner)}成功反殺「劈」！原本拉莊債務已成功砍半結算！`);
        }
    }

    // 【功能：割禾青（全額支付）】
    function executeSurrender(player) {
        const incomingDebts = getIncomingDebts(player);
        if (incomingDebts.length === 0) return;

        let finalSettlement = 0;
        for (let debt of incomingDebts) {
            finalSettlement += debt.amount;
            globalScores[debt.creditor] += debt.amount;
            globalScores[player] -= debt.amount;
            laZhuangPools[debt.creditor][player] = 0;
        }

        alert(`【${formatPlayerForLog(player)} 割禾青結算成功】\n累積總債務：${finalSettlement} 番\n結清離場 -> 支付：${finalSettlement} 番！`);

        debtHistory.push({
            text: `${formatPlayerForLog(player)}選擇「割禾青」`,
            detail: `認輸結清，支付完整累積番數給拉莊者`,
            score: `-${finalSettlement}`
        });

        updateUI();
    }

    function updateUI() {
        let anySurrender = false;
        for (let p of PLAYERS) {
            const card = document.getElementById(`card-${p}`);
            const statusText = document.getElementById(`status-${p}`);
            const poolText = document.getElementById(`pool-${p}`);
            const sBox = document.getElementById(`surrenderBox-${p}`);
            const incomingDebts = getIncomingDebts(p);
            const outgoingDebts = getOutgoingDebts(p);
            const incomingTotal = totalDebt(incomingDebts);
            const outgoingTotal = totalDebt(outgoingDebts);

            if (incomingDebts.length > 0) {
                card.classList.add('is-targeted');
            } else {
                card.classList.remove('is-targeted');
            }

            const statusParts = [];
            if (outgoingDebts.length > 0) {
                statusParts.push(`拉莊中：${outgoingDebts.map(debt => `${formatPlayerForLog(debt.debtor)} ${debt.amount}番`).join('、')}`);
            }
            if (incomingDebts.length > 0) {
                statusParts.push(`被拉莊：${incomingDebts.map(debt => `${formatPlayerForLog(debt.creditor)} ${debt.amount}番`).join('、')}`);
            }

            if (statusParts.length > 0) {
                statusText.innerHTML = statusParts.map(escapeHTML).join('<br>');
                statusText.style.color = incomingDebts.length > 0 ? 'var(--accent)' : 'var(--success)';
            } else {
                statusText.innerText = p === '東' ? '連莊中' : '閒家';
                statusText.style.color = '#718096';
            }

            if (incomingTotal > 0 && outgoingTotal > 0) {
                poolText.innerText = `被拉 ${incomingTotal} / 拉出 ${outgoingTotal} 番`;
            } else if (incomingTotal > 0) {
                poolText.innerText = `被拉 ${incomingTotal} 番`;
            } else if (outgoingTotal > 0) {
                poolText.innerText = `拉出 ${outgoingTotal} 番`;
            } else {
                poolText.innerText = '0 番';
            }
            poolText.style.color = incomingTotal > 0 ? 'var(--accent)' : (outgoingTotal > 0 ? 'var(--success)' : (p === '東' ? '#ecc94b' : 'var(--accent)'));

            if (incomingDebts.length > 0) {
                sBox.style.display = 'block';
                document.getElementById(`label-debt-${p}`).innerText = incomingTotal;
                anySurrender = true;
            } else {
                sBox.style.display = 'none';
            }
        }

        document.getElementById('surrenderArea').style.display = anySurrender ? 'grid' : 'none';

        for (let p of PLAYERS) {
            const totalEl = document.getElementById(`total-${p}`);
            const incomingDebts = getIncomingDebts(p);
            const outgoingDebts = getOutgoingDebts(p);
            totalEl.innerText = (globalScores[p] >= 0 ? '+' : '') + globalScores[p];
            totalEl.className = globalScores[p] >= 0 ? 'score-pos' : 'score-neg';

            const statusEl = document.getElementById(`global-status-${p}`);
            const statusParts = [];
            if (p === '東') statusParts.push('<span style="color:#ecc94b; font-weight:bold;">莊家</span>');
            if (incomingDebts.length > 0) {
                statusParts.push(`<span style="color:var(--accent); font-weight:bold;">被拉莊 (${escapeHTML(incomingDebts.map(debt => `${formatPlayerForLog(debt.creditor)} ${debt.amount}番`).join('、'))})</span>`);
            }
            if (outgoingDebts.length > 0) {
                statusParts.push(`<span style="color:var(--success); font-weight:bold;">拉莊中 (${escapeHTML(outgoingDebts.map(debt => `${formatPlayerForLog(debt.debtor)} ${debt.amount}番`).join('、'))})</span>`);
            }
            statusEl.innerHTML = statusParts.length > 0 ? statusParts.join('<br>') : '正常';
        }

        const listEl = document.getElementById('historyList');
        if (debtHistory.length === 0) {
            listEl.innerHTML = '<li style="color:#a0aec0; text-align:center;">暫無對局紀錄</li>';
        } else {
            listEl.innerHTML = debtHistory.map(item => `
                <li class="history-item">
                    <div>
                        <strong>${escapeHTML(item.text)}</strong>
                        <div class="formula">${escapeHTML(item.detail)}</div>
                    </div>
                    <span style="font-weight:bold;">${escapeHTML(item.score)}</span>
                </li>
            `).reverse().join('');
        }
    }

    function resetAllScores() {
        if (confirm('確定要清除所有人橫跨多局的「總分數」排行榜嗎？')) {
            globalScores = { '東': 0, '南': 0, '西': 0, '北': 0 };
            laZhuangPools = createEmptyDebtPools();
            debtHistory = [];
            updateUI();
        }
    }

    updatePlayerLabels();
    toggleLoserField();
    updateUI();
</script>
</body>
</html>
